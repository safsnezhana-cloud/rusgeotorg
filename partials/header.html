<header class="header" role="banner">
    <div class="container header__container">
        <!-- Logo -->
        <a href="index.html" class="header__logo logo" aria-label="TEST GEO - на главную">
            <span class="logo__text">TEST</span>
            <span class="logo__accent">GEO</span>
        </a>
        
        <!-- Mobile Menu Button -->
        <button class="header__mobile-toggle" aria-label="Открыть меню" aria-expanded="false">
            <span class="hamburger"></span>
        </button>
        
        <!-- Navigation -->
        <nav class="header__nav nav" role="navigation" aria-label="Главная навигация">
            <ul class="nav__list">
                <li class="nav__item">
                    <a href="#" class="nav__link nav__link--active">Главная</a>
                </li>
                <li class="nav__item">
                    <a href="#" class="nav__link">Товары</a>
                </li>
                <li class="nav__item">
                    <a href="#" class="nav__link">Контакты</a>
                </li>
                <li class="nav__item">
                    <a href="#" class="nav__link">О нас</a>
                </li>
            </ul>
        </nav>
        
        <!-- Header Actions -->
        <div class="header__actions">
            <!-- Search -->
            <div class="header__search search">
                <form class="search__form" action="/search" method="get" role="search">
                    <label for="search-input" class="visually-hidden">Поиск по сайту</label>
                    <input 
                        type="search" 
                        id="search-input"
                        class="search__input" 
                        placeholder="Поиск товаров..."
                        aria-label="Поиск товаров"
                    >
                    <button type="submit" class="search__button" aria-label="Найти">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                    </button>
                </form>
            </div>
            
            <!-- Cart -->
            <a href="#" class="header__cart cart" aria-label="Корзина">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="9" cy="21" r="1"></circle>
                    <circle cx="20" cy="21" r="1"></circle>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                </svg>
                <span class="cart__count" aria-live="polite">0</span>
            </a>
        </div>
    </div>
</header>
