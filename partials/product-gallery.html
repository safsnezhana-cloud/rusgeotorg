<div class="product__gallery gallery">
    <!-- Main Image -->
    <div class="gallery__main">
        <div class="gallery__main-wrapper">
            <img 
                src="img/product-main.jpg" 
                alt="Инфракрасный пирометр Fluke 62 MAX - вид спереди" 
                class="gallery__main-image"
                id="mainImage"
                itemprop="image"
            >
            <!-- Zoom Badge -->
            <span class="gallery__zoom-badge">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                    <path d="M11 8v6M8 11h6"></path>
                </svg>
            </span>
        </div>
    </div>
    
    <!-- Thumbnails -->
    <div class="gallery__thumbnails">
        <button 
            class="gallery__thumb gallery__thumb--active" 
            aria-label="Изображение 1"
            aria-pressed="true"
            data-image="img/product-main.jpg"
        >
            <img src="img/product-thumb-1.jpg" alt="Fluke 62 MAX - вид 1">
        </button>
        <button 
            class="gallery__thumb" 
            aria-label="Изображение 2"
            aria-pressed="false"
            data-image="img/product-thumb-2.jpg"
        >
            <img src="img/product-thumb-2.jpg" alt="Fluke 62 MAX - вид 2">
        </button>
        <button 
            class="gallery__thumb" 
            aria-label="Изображение 3"
            aria-pressed="false"
            data-image="img/product-thumb-3.jpg"
        >
            <img src="img/product-thumb-3.jpg" alt="Fluke 62 MAX - вид 3">
        </button>
    </div>
</div>
